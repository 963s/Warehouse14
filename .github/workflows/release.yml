# ──────────────────────────────────────────────────────────────────────
# Warehouse14 POS — release pipeline.
#
# Triggers on a SemVer tag push (`v0.1.0`, `v1.2.3`, etc.) and:
#   1. Builds the desktop bundle on three native runners simultaneously:
#        macos-14    (Apple Silicon, arm64)
#        macos-13    (Intel,        x86_64)
#        windows-latest (x86_64)
#   2. Each runner signs its bundle with TAURI_SIGNING_PRIVATE_KEY
#      (held in repo secrets). Tauri emits matching `.sig` files
#      next to every artifact for the updater's minisign verification.
#   3. `tauri-apps/tauri-action` aggregates artifacts into a single
#      GitHub Release and generates `latest.json` — the manifest the
#      auto-updater (configured in tauri.conf.json) polls.
#   4. The next time any installed copy of the POS checks for updates,
#      it pulls `latest.json` from this release, verifies the signature
#      against the embedded public key, downloads the right bundle for
#      its platform, and prompts the operator to install.
#
# Operator action required:
#   • Set the two repo secrets:
#       TAURI_SIGNING_PRIVATE_KEY          ← contents of warehouse14_updater.key
#       TAURI_SIGNING_PRIVATE_KEY_PASSWORD ← empty string (we generated no-pw)
#   • Tag + push:
#       git tag v0.1.0 && git push --tags
# ──────────────────────────────────────────────────────────────────────

name: release

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual trigger for testing — won't create a release, only artifacts.
  workflow_dispatch:

permissions:
  contents: write    # required to create the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust-target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13
            rust-target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    name: build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo registry + build target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/tauri-pos/src-tauri/target
          key: cargo-${{ matrix.rust-target }}-${{ hashFiles('apps/tauri-pos/src-tauri/Cargo.lock') }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build all internal packages tauri-pos imports (dist-based workspace deps)
        # tauri-pos imports these as built packages (main -> ./dist). Vite fails
        # to resolve any that is not built. i18n-de + appointments were extracted
        # after v0.4.33, so they MUST be built here alongside the original four.
        run: |
          pnpm --filter @warehouse14/inventory-lock build
          pnpm --filter @warehouse14/db build
          pnpm --filter @warehouse14/ui-kit build
          pnpm --filter @warehouse14/api-client build
          pnpm --filter @warehouse14/i18n-de build
          pnpm --filter @warehouse14/appointments build

      - name: Patch updater endpoint with this repo's coordinates
        # The committed tauri.conf.json carries __GITHUB_OWNER__ /
        # __GITHUB_REPO__ placeholders so a local build never accidentally
        # points at a stranger's releases. CI substitutes the real values
        # here, just before `tauri build`, using the repo metadata.
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          CONF="apps/tauri-pos/src-tauri/tauri.conf.json"
          sed -i.bak \
            -e "s|__GITHUB_OWNER__|${OWNER}|g" \
            -e "s|__GITHUB_REPO__|${REPO}|g" \
            "$CONF"
          rm -f "${CONF}.bak"
          echo "Patched updater endpoint:"
          grep -A1 endpoints "$CONF" | head -3

      - name: Assemble release notes from CHANGELOG.md
        # The in-app „Was ist neu" list is the updater manifest's `notes`, which
        # tauri-action fills from releaseBody. Pull this version's section out of
        # CHANGELOG.md so each release carries its own German change list.
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$VER" '
            index($0, "## [" ver "]") == 1 { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="Neue Version ${GITHUB_REF_NAME}. Fehlerbehebungen und Verbesserungen."
          fi
          {
            echo "RELEASE_NOTES<<__W14_EOF__"
            echo "## Warehouse14 POS ${GITHUB_REF_NAME}"
            echo ""
            echo "${NOTES}"
            echo ""
            echo "Automatisches Update. Jede installierte Kopie holt sich diese Version."
            echo "__W14_EOF__"
          } >> "$GITHUB_ENV"
          echo "Assembled release notes:"; echo "${NOTES}"

      - name: Build + bundle + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                          ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:             ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD:    ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/tauri-pos
          args: --target ${{ matrix.rust-target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Warehouse14 POS ${{ github.ref_name }}'
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # The bundle is adhoc-codesigned by Tauri (bundle.macOS.signingIdentity
      # = "-") between .app assembly and DMG/updater-tar packaging, so BOTH
      # shipped artifacts carry the SAME internally-consistent signature. This
      # step is the regression gate: a fresh install must be "unidentified
      # developer" (the documented xattr flow), never "damaged". It fails the
      # job if the bundle has the linker-only adhoc Mach-O signature without a
      # sealed _CodeSignature/CodeResources (the inconsistency that triggers
      # "is damaged and can't be opened").
      - name: Verify macOS bundle signature is consistent (not "damaged")
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="apps/tauri-pos/src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos"
          APP="$(find "$BUNDLE_DIR" -maxdepth 1 -name '*.app' | head -1)"
          echo "Bundle under test: $APP"
          if [ -z "$APP" ]; then
            echo "::error::no .app found under $BUNDLE_DIR"; exit 1
          fi
          if [ ! -f "$APP/Contents/_CodeSignature/CodeResources" ]; then
            echo "::error::missing Contents/_CodeSignature/CodeResources — bundle was not codesigned; a fresh install will show 'is damaged and can't be opened'"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=4 "$APP"
          echo "✓ codesign --verify --deep --strict passed AND _CodeSignature/CodeResources is present"
