<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Warehouse14 Begleiter</title>
<style>
  :root {
    color-scheme: dark light;
    --bg: #0b0d12;
    --bg-elev: #12151c;
    --bg-elev-2: #1a1e27;
    --line: #272c38;
    --line-soft: #1f2430;
    --fg: #f3f4f6;
    --fg-dim: #9ca3af;
    --fg-faint: #6b7280;
    --accent: #f0b429;        /* gold */
    --accent-fg: #1a1205;
    --ok: #34d399;
    --danger: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
    --tap: 56px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  #app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ── Top bar ───────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; gap: .75rem;
    padding: .9rem 1.1rem;
    border-bottom: 1px solid var(--line-soft);
    background: var(--bg-elev);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar .brand { font-weight: 700; letter-spacing: .2px; font-size: 1.05rem; }
  .topbar .brand b { color: var(--accent); }
  .topbar .role-pill {
    margin-left: auto; font-size: .8rem; color: var(--fg-dim);
    border: 1px solid var(--line); border-radius: 999px;
    padding: .3rem .75rem; white-space: nowrap;
  }
  .btn-switch {
    appearance: none; border: 1px solid var(--line); background: transparent;
    color: var(--fg-dim); font-size: .82rem; border-radius: 999px;
    padding: .4rem .8rem; cursor: pointer; min-height: 40px;
  }
  .btn-switch:active { background: var(--bg-elev-2); }

  /* ── Generic layout ────────────────────────────────────── */
  .screen { flex: 1; display: flex; flex-direction: column; }
  .center { flex: 1; display: grid; place-items: center; padding: 1.5rem; }
  .card {
    width: 100%; max-width: 30rem; background: var(--bg-elev);
    border: 1px solid var(--line-soft); border-radius: var(--radius);
    padding: 2rem 1.75rem;
  }
  /* Role-chooser card gets more room so the BIG tiles breathe on tablet. */
  .card.wide { max-width: 46rem; }
  h1 { font-size: 1.5rem; margin: 0 0 .35rem; }
  .sub { color: var(--fg-dim); margin: 0 0 1.5rem; line-height: 1.5; }

  label.field { display: block; margin: 0 0 1.25rem; }
  label.field .lab { display: block; font-size: .85rem; color: var(--fg-dim); margin-bottom: .5rem; }

  .code-input {
    width: 100%; font-size: 2rem; letter-spacing: .5rem; text-align: center;
    font-variant-numeric: tabular-nums; font-weight: 600;
    padding: .9rem 1rem; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    min-height: var(--tap); outline: none;
  }
  .code-input:focus { border-color: var(--accent); }

  /* Role list (vertical, used on the pairing card). */
  .roles { display: grid; gap: .75rem; margin: 1rem 0 .5rem; }
  .role-btn {
    appearance: none; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: .9rem;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    border-radius: var(--radius-sm); padding: 1rem 1.1rem; min-height: var(--tap);
    transition: border-color .12s, background .12s;
  }
  .role-btn:active { background: #20252f; }
  .role-btn[aria-pressed="true"] { border-color: var(--accent); background: #221a08; }
  .role-btn .ico { font-size: 1.6rem; width: 2rem; text-align: center; }
  .role-btn .rt { font-weight: 600; }
  .role-btn .rd { display: block; font-size: .8rem; color: var(--fg-dim); margin-top: .15rem; }

  /* Role chooser — BIG icon tiles shown after a valid code (step 2). */
  .role-grid {
    display: grid; gap: 1rem; margin: 1.5rem 0 .25rem;
    grid-template-columns: 1fr;
  }
  @media (min-width: 560px) { .role-grid { grid-template-columns: repeat(3, 1fr); } }
  .role-tile {
    appearance: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: .65rem; text-align: center;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    border-radius: var(--radius); padding: 1.6rem 1rem; min-height: 9.5rem;
    transition: border-color .12s, background .12s, transform .06s;
  }
  .role-tile:active { transform: scale(.985); background: #20252f; }
  .role-tile .ico { font-size: 3rem; line-height: 1; }
  .role-tile .rt { font-weight: 700; font-size: 1.15rem; }
  .role-tile .rd { font-size: .82rem; color: var(--fg-dim); line-height: 1.4; }

  /* ── Tabs (warehouse tool switcher) ────────────────────── */
  .tabs {
    display: flex; gap: .4rem; padding: .6rem 1.1rem 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    border-bottom: 1px solid var(--line-soft); background: var(--bg-elev);
    position: sticky; top: 0; z-index: 5;
  }
  .tab {
    appearance: none; cursor: pointer; white-space: nowrap;
    border: none; background: transparent; color: var(--fg-dim);
    font-size: .92rem; font-weight: 600; padding: .7rem .9rem; min-height: 48px;
    border-bottom: 2px solid transparent;
  }
  .tab[aria-selected="true"] { color: var(--fg); border-bottom-color: var(--accent); }

  /* ── Forms (add / edit product, bin edit, scan) ────────── */
  .form { display: flex; flex-direction: column; gap: 1rem; }
  .form-row { display: grid; gap: 1rem; }
  @media (min-width: 560px) { .form-row.two { grid-template-columns: 1fr 1fr; }
                              .form-row.three { grid-template-columns: 1fr 1fr 1fr; } }
  .fl { display: flex; flex-direction: column; gap: .4rem; }
  .fl > .lab { font-size: .82rem; color: var(--fg-dim); }
  .fl > .lab .req { color: var(--accent); }
  .inp, .sel, .ta {
    width: 100%; font-size: 1rem; padding: .8rem .9rem;
    border-radius: var(--radius-sm); border: 1px solid var(--line);
    background: var(--bg-elev-2); color: var(--fg); min-height: var(--tap); outline: none;
  }
  .inp:focus, .sel:focus, .ta:focus { border-color: var(--accent); }
  .ta { min-height: 5rem; resize: vertical; line-height: 1.4; }
  .sel { appearance: none; }
  .sectionhead {
    font-size: .8rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--fg-faint); margin: .5rem 0 -.25rem;
  }
  .btn-row { display: flex; gap: .75rem; margin-top: .5rem; }
  .btn-ghost {
    appearance: none; cursor: pointer; flex: 1;
    background: transparent; color: var(--fg); border: 1px solid var(--line);
    font-weight: 600; font-size: 1rem; border-radius: var(--radius-sm);
    padding: .9rem; min-height: var(--tap);
  }
  .btn-ghost:active { background: var(--bg-elev-2); }
  .btn-primary.inline { width: auto; flex: 1; margin-top: 0; }
  .notice {
    border-radius: var(--radius-sm); padding: .85rem 1rem; font-size: .9rem; line-height: 1.45;
    border: 1px solid var(--line-soft); background: var(--bg-elev);
  }
  .notice.ok { border-color: rgba(52,211,153,.4); color: var(--ok); }
  .notice.bad { border-color: rgba(248,113,113,.4); color: var(--danger); }
  .notice.info { color: var(--fg-dim); }

  /* Big, unambiguous scan field. */
  .scanwrap { display: flex; flex-direction: column; gap: .75rem; }
  .scan-input {
    width: 100%; font-size: 1.35rem; letter-spacing: .04em;
    padding: 1rem 1.1rem; border-radius: var(--radius-sm);
    border: 2px solid var(--accent); background: var(--bg-elev-2); color: var(--fg);
    min-height: 64px; outline: none; font-variant-numeric: tabular-nums;
  }
  .scan-input::placeholder { color: var(--fg-faint); letter-spacing: 0; }
  .scan-label {
    display: flex; align-items: center; gap: .5rem;
    font-weight: 700; font-size: 1rem;
  }
  .scan-label .ico { font-size: 1.3rem; }
  .scan-help { color: var(--fg-faint); font-size: .82rem; line-height: 1.4; }

  /* Pills used inside result cards. */
  .pill {
    display: inline-block; font-size: .72rem; font-weight: 700;
    border-radius: 999px; padding: .2rem .6rem; vertical-align: middle;
  }
  .pill.av { color: var(--ok); border: 1px solid rgba(52,211,153,.4); }
  .pill.dr { color: var(--accent); border: 1px solid rgba(240,180,41,.4); }
  .pill.muted { color: var(--fg-faint); border: 1px solid var(--line-soft); }

  .skuhit .actions { display: flex; gap: .6rem; margin-top: 1rem; flex-wrap: wrap; }
  .skuhit .actions button {
    appearance: none; cursor: pointer; flex: 1; min-width: 8rem;
    border: 1px solid var(--accent); background: transparent; color: var(--accent);
    border-radius: var(--radius-sm); padding: .7rem; min-height: 48px; font-weight: 600;
  }
  .skuhit .actions button:active { background: #221a08; }

  .btn-primary {
    appearance: none; width: 100%; cursor: pointer;
    background: var(--accent); color: var(--accent-fg);
    font-weight: 700; font-size: 1.05rem;
    border: none; border-radius: var(--radius-sm);
    padding: 1rem; min-height: var(--tap); margin-top: .5rem;
  }
  .btn-primary:disabled { opacity: .45; cursor: default; }
  .btn-primary:active:not(:disabled) { filter: brightness(.94); }

  .err {
    color: var(--danger); font-size: .9rem; margin: .25rem 0 1rem;
    min-height: 1.2em;
  }

  /* ── Customer display ──────────────────────────────────── */
  .display-wrap {
    flex: 1; display: flex; flex-direction: column;
    padding: clamp(1rem, 4vw, 3rem);
  }
  .display-head { font-size: clamp(1.1rem, 3vw, 1.6rem); color: var(--fg-dim); margin-bottom: 1rem; }
  .display-items { flex: 1; overflow-y: auto; }
  .display-line {
    display: flex; align-items: baseline; gap: 1rem;
    padding: clamp(.6rem, 2vw, 1.1rem) 0;
    border-bottom: 1px solid var(--line-soft);
    font-size: clamp(1.2rem, 3.5vw, 2rem);
  }
  .display-line .qty { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 2.5em; }
  .display-line .nm { flex: 1; }
  .display-line .ln { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .display-empty {
    flex: 1; display: grid; place-items: center; text-align: center;
    color: var(--fg-faint); font-size: clamp(1.2rem, 4vw, 2rem);
  }
  .display-total {
    margin-top: auto; padding-top: 1.25rem;
    display: flex; align-items: baseline; justify-content: space-between;
    border-top: 2px solid var(--line);
  }
  .display-total .tl { font-size: clamp(1.2rem, 4vw, 2.2rem); color: var(--fg-dim); }
  .display-total .tv {
    font-size: clamp(2.2rem, 9vw, 5rem); font-weight: 800;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }

  /* ── Cashier / warehouse list ──────────────────────────── */
  .pad { padding: 1rem 1.1rem; }
  .search {
    width: 100%; font-size: 1.05rem; padding: .85rem 1rem;
    border-radius: var(--radius-sm); border: 1px solid var(--line);
    background: var(--bg-elev-2); color: var(--fg); min-height: var(--tap); outline: none;
    margin-bottom: 1rem;
  }
  .search:focus { border-color: var(--accent); }
  .list { display: flex; flex-direction: column; gap: .6rem; }
  .row {
    display: flex; align-items: center; gap: 1rem;
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: .85rem 1rem;
  }
  .row .meta { flex: 1; min-width: 0; }
  .row .nm { font-weight: 600; }
  .row .sku { font-size: .8rem; color: var(--fg-dim); margin-top: .15rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .price { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
  .row .add {
    appearance: none; cursor: pointer; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); border-radius: 999px;
    width: 44px; height: 44px; font-size: 1.4rem; line-height: 1; flex: none;
  }
  .row .add:active { background: #221a08; }
  .hint { color: var(--fg-faint); font-size: .82rem; margin: .25rem 0 1rem; }
  .state-msg { color: var(--fg-dim); text-align: center; padding: 2.5rem 1rem; }
  .badge-soft {
    display: inline-block; font-size: .7rem; color: var(--fg-faint);
    border: 1px solid var(--line-soft); border-radius: 999px; padding: .15rem .5rem;
    margin-left: .5rem; vertical-align: middle;
  }
  .skuhit {
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: 1.1rem 1.2rem; margin-top: 1rem;
  }
  .skuhit .kv { display: flex; justify-content: space-between; gap: 1rem; padding: .35rem 0; }
  .skuhit .kv .k { color: var(--fg-dim); }
  .skuhit .kv .v { font-weight: 600; text-align: right; }

  /* ── Zweitkasse cart (client-side line list) ───────────────── */
  .cartwrap { border-top: 1px solid var(--line-soft); margin-top: 1rem; padding-top: 1rem; }
  .cart-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: .6rem;
  }
  .cart-head .t { font-weight: 700; font-size: 1rem; }
  .cart-head .c { color: var(--fg-dim); font-size: .85rem; }
  .cart-list { display: flex; flex-direction: column; gap: .5rem; }
  .cart-row {
    display: flex; align-items: center; gap: .75rem;
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: .6rem .75rem;
  }
  .cart-row .meta { flex: 1; min-width: 0; }
  .cart-row .nm { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cart-row .sub { font-size: .78rem; color: var(--fg-dim); margin-top: .1rem; }
  .cart-row .ln { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
  .qty-ctrl { display: flex; align-items: center; gap: .4rem; }
  .qty-ctrl button {
    appearance: none; cursor: pointer; width: 36px; height: 36px; flex: none;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    border-radius: 8px; font-size: 1.25rem; line-height: 1;
  }
  .qty-ctrl button:active { background: #20252f; }
  .qty-ctrl .q { min-width: 1.6em; text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; }
  .cart-row .rm {
    appearance: none; cursor: pointer; flex: none; border: none; background: transparent;
    color: var(--fg-faint); font-size: 1.4rem; line-height: 1; width: 32px; height: 36px;
  }
  .cart-row .rm:active { color: var(--danger); }
  .cart-total {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-top: .9rem; padding-top: .9rem; border-top: 2px solid var(--line);
  }
  .cart-total .tl { font-size: 1.1rem; color: var(--fg-dim); }
  .cart-total .tv {
    font-size: 1.6rem; font-weight: 800; color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .cart-empty { color: var(--fg-faint); text-align: center; padding: 1.25rem 1rem; }

  /* ── Thumb-zone bottom bar (sticky primary action, ~56px reachable arc) ── */
  /* The screen content gets bottom padding so the fixed bar never covers it. */
  .has-bottombar { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 5.5rem); }
  .bottombar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: .7rem .9rem calc(.7rem + env(safe-area-inset-bottom, 0px));
    background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: .75rem;
  }
  .bottombar .bb-info { flex: 1; min-width: 0; }
  .bottombar .bb-info .t { font-weight: 700; font-size: 1.05rem;
    font-variant-numeric: tabular-nums; }
  .bottombar .bb-info .s { font-size: .8rem; color: var(--fg-dim); margin-top: .1rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bottombar .bb-action {
    appearance: none; cursor: pointer; flex: none;
    background: var(--accent); color: var(--accent-fg);
    font-weight: 800; font-size: 1.05rem; border: none;
    border-radius: var(--radius-sm); padding: 0 1.4rem; min-height: 56px;
  }
  .bottombar .bb-action:disabled { opacity: .45; cursor: default; }
  .bottombar .bb-action:active:not(:disabled) { filter: brightness(.94); }
  .bottombar .bb-action.ghost {
    background: transparent; color: var(--fg); border: 1px solid var(--line);
    font-weight: 700; padding: 0 1.1rem;
  }
  .bottombar .bb-action.wide { flex: 1; }

  /* ── Scan feedback overlay (100ms multimodal: green/red flash + item) ──── */
  .scanfx {
    position: fixed; inset: 0; z-index: 40; pointer-events: none;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 18vh;
  }
  .scanfx.flash::before {
    content: ""; position: absolute; inset: 0;
    animation: scanflash .42s ease-out forwards;
  }
  .scanfx.ok::before    { background: var(--ok); }
  .scanfx.bad::before   { background: var(--danger); }
  @keyframes scanflash { from { opacity: .34; } to { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .scanfx.flash::before { animation: none; opacity: 0; }
  }
  .scanfx .toast {
    position: relative; max-width: 22rem; width: calc(100% - 2rem);
    display: flex; align-items: center; gap: .9rem;
    background: var(--bg-elev-2); border: 1px solid var(--line);
    border-radius: var(--radius); padding: .85rem 1rem;
    box-shadow: 0 18px 50px rgba(0,0,0,.45);
  }
  .scanfx .toast.ok  { border-color: rgba(52,211,153,.55); }
  .scanfx .toast.bad { border-color: rgba(248,113,113,.55); }
  .scanfx .toast .ic { font-size: 1.7rem; line-height: 1; flex: none; }
  .scanfx .toast .tx { min-width: 0; }
  .scanfx .toast .tt { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scanfx .toast .td { font-size: .82rem; color: var(--fg-dim); margin-top: .1rem; }
  .scanfx .toast .thumb {
    width: 44px; height: 44px; flex: none; border-radius: 8px; object-fit: cover;
    background: var(--bg); border: 1px solid var(--line-soft);
  }

  /* ── Snackbar (undo / status) — bottom, above the bottom bar ──────────── */
  .snackbar {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 6.25rem); z-index: 45;
    display: flex; align-items: center; gap: 1rem; max-width: 26rem;
    width: calc(100% - 2rem);
    background: var(--bg-elev-2); color: var(--fg);
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: .8rem 1rem; box-shadow: 0 14px 40px rgba(0,0,0,.4);
  }
  .snackbar .msg { flex: 1; min-width: 0; font-size: .92rem; }
  .snackbar .undo {
    appearance: none; cursor: pointer; flex: none; border: none; background: transparent;
    color: var(--accent); font-weight: 800; font-size: .92rem;
    padding: .4rem .6rem; min-height: 40px;
  }

  /* ── Batch strip (live count + subtotal while bulk-adding) ─────────────── */
  .batchstrip {
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    background: var(--bg-elev-2); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: .7rem 1rem; margin-bottom: 1rem;
  }
  .batchstrip .bl { color: var(--fg-dim); font-size: .85rem; }
  .batchstrip .bv { font-weight: 700; font-variant-numeric: tabular-nums; }

  /* ── Inventory rows with photo + bin (≥48px) ──────────────────────────── */
  .invrow {
    display: flex; align-items: center; gap: .85rem;
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: .65rem .8rem; min-height: 56px;
    width: 100%; text-align: left; appearance: none; cursor: pointer; color: var(--fg);
  }
  .invrow:active { background: var(--bg-elev-2); }
  .invrow .thumb {
    width: 48px; height: 48px; flex: none; border-radius: 8px; object-fit: cover;
    background: var(--bg-elev-2); border: 1px solid var(--line-soft);
    display: grid; place-items: center; color: var(--fg-faint); font-size: 1.3rem;
  }
  .invrow .meta { flex: 1; min-width: 0; }
  .invrow .nm { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .invrow .sub { font-size: .8rem; color: var(--fg-dim); margin-top: .15rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .invrow .right { text-align: right; flex: none; }
  .invrow .price { font-variant-numeric: tabular-nums; font-weight: 600; }
  .invrow .bin { font-size: .75rem; color: var(--fg-faint); margin-top: .15rem; }

  /* ── Camera capture sheet ─────────────────────────────────────────────── */
  .sheet {
    position: fixed; inset: 0; z-index: 50; background: rgba(4,6,10,.82);
    display: flex; flex-direction: column;
  }
  .sheet-head {
    display: flex; align-items: center; gap: .75rem; padding: .9rem 1.1rem;
    padding-top: calc(.9rem + env(safe-area-inset-top, 0px));
    border-bottom: 1px solid var(--line-soft); background: var(--bg-elev);
  }
  .sheet-head .t { font-weight: 700; font-size: 1.05rem; flex: 1; }
  .sheet-head .x {
    appearance: none; cursor: pointer; border: 1px solid var(--line); background: transparent;
    color: var(--fg); border-radius: 999px; width: 44px; height: 44px; font-size: 1.3rem; line-height: 1;
  }
  .sheet-body { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 1rem; gap: 1rem; }
  .cam-stage {
    flex: 1; min-height: 0; border-radius: var(--radius); overflow: hidden;
    background: #000; display: grid; place-items: center; position: relative;
  }
  .cam-stage video, .cam-stage img, .cam-stage canvas {
    width: 100%; height: 100%; object-fit: contain; display: block;
  }
  .cam-stage .ph { color: var(--fg-faint); font-size: .9rem; padding: 2rem; text-align: center; }
  .cam-controls { display: flex; gap: .75rem; align-items: center; justify-content: center; }
  .shutter {
    appearance: none; cursor: pointer; flex: none;
    width: 68px; height: 68px; border-radius: 999px;
    background: #fff; border: 4px solid var(--accent);
  }
  .shutter:active { transform: scale(.94); }

  /* ── Photo picker grid (Hauptbild wählen) ─────────────────────────────── */
  .photogrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; }
  .photocell {
    position: relative; appearance: none; cursor: pointer; padding: 0;
    border: 2px solid var(--line); border-radius: var(--radius-sm); overflow: hidden;
    aspect-ratio: 1 / 1; background: var(--bg-elev-2);
  }
  .photocell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photocell .ph { width: 100%; height: 100%; display: grid; place-items: center;
    color: var(--fg-faint); font-size: 1.6rem; }
  .photocell[aria-pressed="true"] { border-color: var(--accent); }
  .photocell .star {
    position: absolute; top: 4px; right: 4px; font-size: .85rem; line-height: 1;
    background: var(--accent); color: var(--accent-fg); border-radius: 999px;
    padding: .15rem .4rem; font-weight: 800;
  }

  /* ── Label preview (printable thermal layout) ─────────────────────────── */
  .label-card {
    background: #fff; color: #000; border-radius: 8px; padding: .8rem;
    width: 100%; max-width: 22rem; margin: 0 auto;
    font-family: system-ui, sans-serif;
  }
  .label-card .lname { font-weight: 700; font-size: 1rem; line-height: 1.2; }
  .label-card .lmeta { font-size: .72rem; color: #444; margin-top: .15rem; }
  .label-card .lprice { font-weight: 800; font-size: 1.3rem; margin: .35rem 0; }
  .label-card svg { display: block; width: 100%; height: 54px; }
  .label-card .lcode { font-family: ui-monospace, monospace; font-size: .7rem;
    text-align: center; letter-spacing: .12em; margin-top: .1rem; color: #000; }

  /* ── Toggle (publish-to-web) ──────────────────────────────────────────── */
  .toggle { display: flex; align-items: center; gap: .75rem; min-height: 48px; }
  .toggle input { position: absolute; opacity: 0; pointer-events: none; }
  .toggle .track {
    width: 52px; height: 30px; border-radius: 999px; background: var(--bg-elev-2);
    border: 1px solid var(--line); position: relative; flex: none; transition: background .12s, border-color .12s;
  }
  .toggle .track::after {
    content: ""; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px;
    border-radius: 999px; background: var(--fg-dim); transition: transform .14s, background .12s;
  }
  .toggle input:checked + .track { background: #221a08; border-color: var(--accent); }
  .toggle input:checked + .track::after { transform: translateX(22px); background: var(--accent); }
  .toggle input:focus-visible + .track { outline: 2px solid var(--accent); outline-offset: 2px; }
  .toggle .tlab { font-size: .95rem; }

  /* ── Tender chips (Zweitkasse hand-off / customer-display split) ───────── */
  .tender-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(5rem, 1fr)); gap: .6rem; }
  .tender-chip {
    appearance: none; cursor: pointer; border: 1px solid var(--line);
    background: var(--bg-elev-2); color: var(--fg); border-radius: var(--radius-sm);
    padding: .8rem .5rem; min-height: 56px; font-weight: 700; font-size: 1.05rem;
    font-variant-numeric: tabular-nums;
  }
  .tender-chip:active { background: #20252f; }
  .tender-chip .cl { display: block; font-size: .68rem; color: var(--fg-dim); font-weight: 600; margin-bottom: .15rem; }

  /* Customer-display split Restbetrag line. */
  .display-rest {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-top: .9rem; margin-top: .6rem; border-top: 1px dashed var(--line);
  }
  .display-rest .rl { font-size: clamp(1rem, 3vw, 1.6rem); color: var(--fg-dim); }
  .display-rest .rv { font-size: clamp(1.4rem, 5vw, 3rem); font-weight: 800;
    color: var(--danger); font-variant-numeric: tabular-nums; }

  /* Calm single line-add entrance on the customer display (150–200ms). */
  @keyframes lineIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .display-line.fresh { animation: lineIn .18s ease-out both; }
  @media (prefers-reduced-motion: reduce) { .display-line.fresh { animation: none; } }

  /* ── Termine (appointments) ───────────────────────────────────────────── */
  /* Week strip: 7 day chips + week paging, all ≥48px touch targets. */
  .weekstrip { display: flex; align-items: stretch; gap: .4rem; margin-bottom: .75rem; }
  .weekstrip .wk-nav {
    appearance: none; cursor: pointer; flex: none; width: 44px; min-height: 56px;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg-dim);
    border-radius: var(--radius-sm); font-size: 1.25rem; line-height: 1;
  }
  .weekstrip .wk-nav:active { background: #20252f; }
  .weekstrip .wk-days { display: flex; gap: .35rem; flex: 1; min-width: 0; }
  .daychip {
    appearance: none; cursor: pointer; flex: 1; min-width: 0; min-height: 56px;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg-dim);
    border-radius: var(--radius-sm); padding: .35rem .1rem;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .1rem;
  }
  .daychip .dw { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .daychip .dn { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--fg); }
  .daychip.today .dn { color: var(--accent); }
  .daychip[aria-pressed="true"] { border-color: var(--accent); background: #221a08; }
  .daychip[aria-pressed="true"] .dw { color: var(--accent); }
  .day-head {
    display: flex; align-items: baseline; gap: .75rem; margin-bottom: 1rem;
  }
  .day-head .dh-t { font-weight: 700; font-size: 1.05rem; flex: 1; min-width: 0; }
  .day-head .dh-today {
    appearance: none; cursor: pointer; border: 1px solid var(--line); background: transparent;
    color: var(--accent); font-weight: 700; font-size: .85rem; border-radius: 999px;
    padding: .5rem .9rem; min-height: 40px;
  }

  /* Appointment card: time + name + chips, then a one-tap action row. */
  .appt-card {
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: .9rem 1rem;
    display: flex; flex-direction: column; gap: .65rem;
  }
  .appt-top { display: flex; align-items: center; gap: .75rem; min-width: 0; }
  .appt-time { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 1.1rem; flex: none; }
  .appt-who { font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .appt-sub { font-size: .8rem; color: var(--fg-dim); display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .pill.bad { color: var(--danger); border: 1px solid rgba(248,113,113,.4); }
  .appt-actions { display: flex; gap: .6rem; flex-wrap: wrap; }
  .appt-actions button {
    appearance: none; cursor: pointer; flex: 1; min-width: 7.5rem; min-height: 48px;
    border-radius: var(--radius-sm); font-weight: 600; font-size: .92rem;
    border: 1px solid var(--line); background: transparent; color: var(--fg);
    padding: .6rem .8rem;
  }
  .appt-actions button:active:not(:disabled) { background: var(--bg-elev-2); }
  .appt-actions button:disabled { opacity: .45; cursor: default; }
  .appt-actions button.primary { border-color: var(--accent); color: var(--accent); }
  .appt-actions button.primary:active:not(:disabled) { background: #221a08; }
  .appt-actions button.danger { border-color: rgba(248,113,113,.45); color: var(--danger); }
  .appt-actions button.danger:active:not(:disabled) { background: rgba(248,113,113,.08); }

  /* Neuer-Termin sheet: type tiles + 30-min slot chips. */
  .sheet-body.scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .typegrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; }
  .type-tile {
    appearance: none; cursor: pointer; min-height: 64px;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    border-radius: var(--radius-sm); padding: .6rem .8rem; font-weight: 600; font-size: .95rem;
    display: flex; align-items: center; gap: .6rem; text-align: left;
  }
  .type-tile .ico { font-size: 1.35rem; flex: none; }
  .type-tile:active { background: #20252f; }
  .type-tile[aria-pressed="true"] { border-color: var(--accent); background: #221a08; }
  .slotgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(4.6rem, 1fr)); gap: .5rem; }
  .slot-chip {
    appearance: none; cursor: pointer; min-height: 48px;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    border-radius: var(--radius-sm); font-weight: 700; font-size: .95rem;
    font-variant-numeric: tabular-nums;
  }
  .slot-chip:active { background: #20252f; }
  .slot-chip[aria-pressed="true"] { border-color: var(--accent); background: #221a08; color: var(--accent); }
  .custpick {
    display: flex; align-items: center; gap: .75rem;
    border: 1px solid rgba(240,180,41,.4); background: #221a08;
    border-radius: var(--radius-sm); padding: .7rem .9rem; min-height: 48px;
  }
  .custpick .cp-n { font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .custpick .cp-x {
    appearance: none; cursor: pointer; flex: none; border: none; background: transparent;
    color: var(--fg-dim); font-size: 1.3rem; line-height: 1; width: 40px; height: 40px;
  }

  /* Calm reconnect state (silent token revalidation on load). */
  .reconnect-dot {
    width: 14px; height: 14px; border-radius: 999px; background: var(--accent);
    margin: 0 auto 1.25rem; animation: reconnectPulse 1.2s ease-in-out infinite;
  }
  @keyframes reconnectPulse {
    0%, 100% { opacity: .35; transform: scale(.85); }
    50% { opacity: 1; transform: scale(1); }
  }
  @media (prefers-reduced-motion: reduce) { .reconnect-dot { animation: none; } }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<div id="app"></div>

<!--
  The SPA logic lives in a SEPARATE script served at GET /app.js so the strict
  Content-Security-Policy (delivered as a response header by the mother) can use
  `script-src 'self'` with NO `'unsafe-inline'`. Inline <script> is intentionally
  forbidden here. See companion.rs (build_router / serve_app_js / CSP middleware).
-->
<script src="/app.js"></script>
</body>
