<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Warehouse14 Begleiter</title>
<style>
  :root {
    color-scheme: dark light;
    --bg: #0b0d12;
    --bg-elev: #12151c;
    --bg-elev-2: #1a1e27;
    --line: #272c38;
    --line-soft: #1f2430;
    --fg: #f3f4f6;
    --fg-dim: #9ca3af;
    --fg-faint: #6b7280;
    --accent: #f0b429;        /* gold */
    --accent-fg: #1a1205;
    --ok: #34d399;
    --danger: #f87171;
    --radius: 16px;
    --radius-sm: 10px;
    --tap: 56px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  #app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ── Top bar ───────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; gap: .75rem;
    padding: .9rem 1.1rem;
    border-bottom: 1px solid var(--line-soft);
    background: var(--bg-elev);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar .brand { font-weight: 700; letter-spacing: .2px; font-size: 1.05rem; }
  .topbar .brand b { color: var(--accent); }
  .topbar .role-pill {
    margin-left: auto; font-size: .8rem; color: var(--fg-dim);
    border: 1px solid var(--line); border-radius: 999px;
    padding: .3rem .75rem; white-space: nowrap;
  }
  .btn-switch {
    appearance: none; border: 1px solid var(--line); background: transparent;
    color: var(--fg-dim); font-size: .82rem; border-radius: 999px;
    padding: .4rem .8rem; cursor: pointer; min-height: 40px;
  }
  .btn-switch:active { background: var(--bg-elev-2); }

  /* ── Generic layout ────────────────────────────────────── */
  .screen { flex: 1; display: flex; flex-direction: column; }
  .center { flex: 1; display: grid; place-items: center; padding: 1.5rem; }
  .card {
    width: 100%; max-width: 30rem; background: var(--bg-elev);
    border: 1px solid var(--line-soft); border-radius: var(--radius);
    padding: 2rem 1.75rem;
  }
  h1 { font-size: 1.5rem; margin: 0 0 .35rem; }
  .sub { color: var(--fg-dim); margin: 0 0 1.5rem; line-height: 1.5; }

  label.field { display: block; margin: 0 0 1.25rem; }
  label.field .lab { display: block; font-size: .85rem; color: var(--fg-dim); margin-bottom: .5rem; }

  .code-input {
    width: 100%; font-size: 2rem; letter-spacing: .5rem; text-align: center;
    font-variant-numeric: tabular-nums; font-weight: 600;
    padding: .9rem 1rem; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    min-height: var(--tap); outline: none;
  }
  .code-input:focus { border-color: var(--accent); }

  .roles { display: grid; gap: .75rem; margin: 1rem 0 .5rem; }
  .role-btn {
    appearance: none; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: .9rem;
    border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--fg);
    border-radius: var(--radius-sm); padding: 1rem 1.1rem; min-height: var(--tap);
    transition: border-color .12s, background .12s;
  }
  .role-btn:active { background: #20252f; }
  .role-btn[aria-pressed="true"] { border-color: var(--accent); background: #221a08; }
  .role-btn .ico { font-size: 1.6rem; width: 2rem; text-align: center; }
  .role-btn .rt { font-weight: 600; }
  .role-btn .rd { display: block; font-size: .8rem; color: var(--fg-dim); margin-top: .15rem; }

  .btn-primary {
    appearance: none; width: 100%; cursor: pointer;
    background: var(--accent); color: var(--accent-fg);
    font-weight: 700; font-size: 1.05rem;
    border: none; border-radius: var(--radius-sm);
    padding: 1rem; min-height: var(--tap); margin-top: .5rem;
  }
  .btn-primary:disabled { opacity: .45; cursor: default; }
  .btn-primary:active:not(:disabled) { filter: brightness(.94); }

  .err {
    color: var(--danger); font-size: .9rem; margin: .25rem 0 1rem;
    min-height: 1.2em;
  }

  /* ── Customer display ──────────────────────────────────── */
  .display-wrap {
    flex: 1; display: flex; flex-direction: column;
    padding: clamp(1rem, 4vw, 3rem);
  }
  .display-head { font-size: clamp(1.1rem, 3vw, 1.6rem); color: var(--fg-dim); margin-bottom: 1rem; }
  .display-items { flex: 1; overflow-y: auto; }
  .display-line {
    display: flex; align-items: baseline; gap: 1rem;
    padding: clamp(.6rem, 2vw, 1.1rem) 0;
    border-bottom: 1px solid var(--line-soft);
    font-size: clamp(1.2rem, 3.5vw, 2rem);
  }
  .display-line .qty { color: var(--accent); font-variant-numeric: tabular-nums; min-width: 2.5em; }
  .display-line .nm { flex: 1; }
  .display-line .ln { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .display-empty {
    flex: 1; display: grid; place-items: center; text-align: center;
    color: var(--fg-faint); font-size: clamp(1.2rem, 4vw, 2rem);
  }
  .display-total {
    margin-top: auto; padding-top: 1.25rem;
    display: flex; align-items: baseline; justify-content: space-between;
    border-top: 2px solid var(--line);
  }
  .display-total .tl { font-size: clamp(1.2rem, 4vw, 2.2rem); color: var(--fg-dim); }
  .display-total .tv {
    font-size: clamp(2.2rem, 9vw, 5rem); font-weight: 800;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }

  /* ── Cashier / warehouse list ──────────────────────────── */
  .pad { padding: 1rem 1.1rem; }
  .search {
    width: 100%; font-size: 1.05rem; padding: .85rem 1rem;
    border-radius: var(--radius-sm); border: 1px solid var(--line);
    background: var(--bg-elev-2); color: var(--fg); min-height: var(--tap); outline: none;
    margin-bottom: 1rem;
  }
  .search:focus { border-color: var(--accent); }
  .list { display: flex; flex-direction: column; gap: .6rem; }
  .row {
    display: flex; align-items: center; gap: 1rem;
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: .85rem 1rem;
  }
  .row .meta { flex: 1; min-width: 0; }
  .row .nm { font-weight: 600; }
  .row .sku { font-size: .8rem; color: var(--fg-dim); margin-top: .15rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .price { font-variant-numeric: tabular-nums; font-weight: 600; white-space: nowrap; }
  .row .add {
    appearance: none; cursor: pointer; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); border-radius: 999px;
    width: 44px; height: 44px; font-size: 1.4rem; line-height: 1; flex: none;
  }
  .row .add:active { background: #221a08; }
  .hint { color: var(--fg-faint); font-size: .82rem; margin: .25rem 0 1rem; }
  .state-msg { color: var(--fg-dim); text-align: center; padding: 2.5rem 1rem; }
  .badge-soft {
    display: inline-block; font-size: .7rem; color: var(--fg-faint);
    border: 1px solid var(--line-soft); border-radius: 999px; padding: .15rem .5rem;
    margin-left: .5rem; vertical-align: middle;
  }
  .skuhit {
    background: var(--bg-elev); border: 1px solid var(--line-soft);
    border-radius: var(--radius-sm); padding: 1.1rem 1.2rem; margin-top: 1rem;
  }
  .skuhit .kv { display: flex; justify-content: space-between; gap: 1rem; padding: .35rem 0; }
  .skuhit .kv .k { color: var(--fg-dim); }
  .skuhit .kv .v { font-weight: 600; text-align: right; }
</style>
</head>
<body>
<div id="app"></div>

<!--
  The SPA logic lives in a SEPARATE script served at GET /app.js so the strict
  Content-Security-Policy (delivered as a response header by the mother) can use
  `script-src 'self'` with NO `'unsafe-inline'`. Inline <script> is intentionally
  forbidden here. See companion.rs (build_router / serve_app_js / CSP middleware).
-->
<script src="/app.js"></script>
</body>
</html>
