# ──────────────────────────────────────────────────────────────────────────
# warehouse14 storefront — PRIVATE internal deployment.
#
# This is a STANDALONE compose file. It does NOT touch the production stack
# (docker-compose.prod.yml); it only ADDS one isolated container that ATTACHES
# to the existing warehouse14_default network so it can reach the api at
# http://api:3001 internally.
#
#   • Bound to 127.0.0.1:4312 ONLY — never published to 0.0.0.0, so it is
#     unreachable from the public internet. View it privately over an SSH
#     tunnel:  ssh -L 4312:localhost:4312 myserver  →  http://localhost:4312
#   • No domain, no Cloudflare route, no public exposure.
#
# Deploy:
#   docker compose -f docker-compose.storefront.yml up -d
# Update (after streaming a new image):
#   docker compose -f docker-compose.storefront.yml up -d --force-recreate
# ──────────────────────────────────────────────────────────────────────────
services:
  storefront:
    image: ghcr.io/963s/warehouse14-storefront:latest
    container_name: warehouse14-storefront
    restart: unless-stopped
    # PRIVATE: loopback-only host binding. Reachable solely via SSH tunnel.
    ports:
      - "127.0.0.1:4312:3000"
    environment:
      NODE_ENV: production
      # Server-side data + photo-proxy upstream — the internal network alias.
      # The browser never sees this; it only ever talks to the storefront origin.
      INTERNAL_API_URL: "http://api:3001"
      NEXT_PUBLIC_DATA_SOURCE: "live"
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - warehouse14_default
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 25s

# Attach to the already-running production network (created by
# docker-compose.prod.yml). external:true => compose will NOT create or own it.
networks:
  warehouse14_default:
    external: true
