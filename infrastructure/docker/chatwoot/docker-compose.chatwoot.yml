name: chatwoot

# ──────────────────────────────────────────────────────────────────────────
# Chatwoot — self-hosted customer-service / omnichannel inbox for Warehouse14.
# Runs alongside (but isolated from) the main stack on the Oracle arm64 server.
#   docker compose -f docker-compose.chatwoot.yml run --rm rails bundle exec rails db:chatwoot_prepare
#   docker compose -f docker-compose.chatwoot.yml up -d
# Front it via the existing Cloudflare Tunnel: add a Public Hostname
#   chat.warehouse14.de → http://chatwoot-rails:3000
# The POS embeds the widget (Einstellungen → Kundenservice); a human agent
# answers from the Chatwoot dashboard at https://chat.warehouse14.de.
# ──────────────────────────────────────────────────────────────────────────

x-base: &base
  image: chatwoot/chatwoot:latest
  env_file: .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: chatwoot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - cw_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatwoot -d chatwoot']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: chatwoot-redis
    restart: unless-stopped
    command: [redis-server, --requirepass, '${REDIS_PASSWORD:?set in .env}', --appendonly, 'yes']
    volumes:
      - cw_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # Rails web (the dashboard + widget API).
  rails:
    <<: *base
    container_name: chatwoot-rails
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
    # Reached only by cloudflared on the internal network (no host port).

  # Background jobs (deliveries, webhooks, channel sync).
  sidekiq:
    <<: *base
    container_name: chatwoot-sidekiq
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker

volumes:
  cw_pgdata:
    name: chatwoot-pgdata
  cw_redisdata:
    name: chatwoot-redisdata
